<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 300" fill="none">
  <!-- Neural network "P" shape — navy left stem + orange right curve -->

  <!-- Navy nodes and edges (left/stem side) -->
  <circle cx="60" cy="30"  r="5" fill="#1B2A4A"/>
  <circle cx="60" cy="90"  r="5" fill="#1B2A4A"/>
  <circle cx="60" cy="150" r="5" fill="#1B2A4A"/>
  <circle cx="60" cy="210" r="5" fill="#1B2A4A"/>
  <circle cx="110" cy="30" r="5" fill="#1B2A4A"/>
  <circle cx="110" cy="90" r="5" fill="#1B2A4A"/>
  <circle cx="85" cy="60"  r="4" fill="#1B2A4A"/>
  <circle cx="85" cy="120" r="4" fill="#1B2A4A"/>
  <circle cx="85" cy="180" r="4" fill="#1B2A4A"/>

  <line x1="60" y1="30"  x2="110" y2="30"  stroke="#1B2A4A" stroke-width="2"/>
  <line x1="60" y1="30"  x2="60"  y2="90"  stroke="#1B2A4A" stroke-width="2"/>
  <line x1="60" y1="30"  x2="110" y2="90"  stroke="#1B2A4A" stroke-width="2"/>
  <line x1="110" y1="30" x2="60"  y2="90"  stroke="#1B2A4A" stroke-width="2"/>
  <line x1="110" y1="30" x2="110" y2="90"  stroke="#1B2A4A" stroke-width="2"/>
  <line x1="60"  y1="90" x2="60"  y2="150" stroke="#1B2A4A" stroke-width="2"/>
  <line x1="60"  y1="90" x2="85"  y2="120" stroke="#1B2A4A" stroke-width="2"/>
  <line x1="60"  y1="150" x2="60" y2="210" stroke="#1B2A4A" stroke-width="2"/>
  <line x1="60"  y1="150" x2="85" y2="180" stroke="#1B2A4A" stroke-width="2"/>
  <line x1="60"  y1="210" x2="85" y2="180" stroke="#1B2A4A" stroke-width="2"/>

  <!-- Orange nodes and edges (right/arc side of the P) -->
  <circle cx="160" cy="30"  r="5" fill="#E07C00"/>
  <circle cx="190" cy="60"  r="5" fill="#E07C00"/>
  <circle cx="190" cy="120" r="5" fill="#E07C00"/>
  <circle cx="160" cy="150" r="5" fill="#E07C00"/>
  <circle cx="130" cy="90"  r="5" fill="#E07C00"/>
  <circle cx="175" cy="45"  r="4" fill="#E07C00"/>
  <circle cx="175" cy="135" r="4" fill="#E07C00"/>
  <circle cx="145" cy="165" r="4" fill="#E07C00"/>

  <line x1="110" y1="30"  x2="160" y2="30"  stroke="#E07C00" stroke-width="2"/>
  <line x1="160" y1="30"  x2="190" y2="60"  stroke="#E07C00" stroke-width="2"/>
  <line x1="190" y1="60"  x2="190" y2="120" stroke="#E07C00" stroke-width="2"/>
  <line x1="190" y1="120" x2="160" y2="150" stroke="#E07C00" stroke-width="2"/>
  <line x1="160" y1="150" x2="110" y2="90"  stroke="#E07C00" stroke-width="2"/>
  <line x1="110" y1="90"  x2="160" y2="30"  stroke="#E07C00" stroke-width="2"/>
  <line x1="160" y1="30"  x2="190" y2="120" stroke="#E07C00" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="190" y1="60"  x2="160" y2="150" stroke="#E07C00" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="110" y1="90"  x2="190" y2="60"  stroke="#E07C00" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="110" y1="90"  x2="190" y2="120" stroke="#E07C00" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- AI brain icon circle -->
  <circle cx="170" cy="105" r="18" fill="#1B2A4A"/>
  <!-- Brain circuit lines inside -->
  <text x="170" y="110" font-family="sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">AI</text>

  <!-- PRABHAS text -->
  <text x="130" y="248" font-family="'Arial Black', 'Impact', sans-serif" font-size="40" font-weight="900" fill="#1B2A4A" text-anchor="middle" letter-spacing="2">PRABHAS</text>

  <!-- SaaS text -->
  <text x="118" y="278" font-family="'Arial', sans-serif" font-size="28" font-weight="700" fill="#1B2A4A" text-anchor="middle" letter-spacing="1">SaaS</text>

  <!-- Tricolor underline — saffron stroke -->
  <path d="M148 285 Q165 280 185 287" stroke="#FF9933" stroke-width="4" stroke-linecap="round" fill="none"/>
  <!-- Green stroke -->
  <path d="M148 292 Q165 287 185 294" stroke="#138808" stroke-width="3.5" stroke-linecap="round" fill="none"/>
</svg>
