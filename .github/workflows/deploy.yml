name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Build vendor/ in CI — vendor is gitignored so we install it here
      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install Composer dependencies (production)
        working-directory: lekhya-app
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # Remove the broken absolute symlink from the CI checkout;
      # artisan storage:link will recreate it correctly on the server.
      - name: Remove public/storage symlink before upload
        run: rm -f lekhya-app/public/storage

      # SCP lekhya-app/ → public_html/ on Hostinger.
      # strip_components=1 strips the "lekhya-app" prefix so every file
      # lands directly inside public_html/ (e.g. lekhya-app/public/ → public_html/public/).
      # .env and storage/ contents already on the server are NOT deleted
      # (SCP overwrites but does not delete missing files).
      - name: Upload lekhya-app to public_html
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASS }}
          port: 65002
          source: "lekhya-app"
          target: "public_html"
          strip_components: 1
          overwrite: true

      # Diagnose server layout then rebuild all caches
      - name: Post-deploy cache refresh
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASS }}
          port: 65002
          script: |
            set -e
            echo "=== HOME DIR (full) ===" && ls -la ~/
            echo "=== domains/ or subdomains/ folder if present ===" && (ls -la ~/domains/ 2>/dev/null || echo "no domains/ folder"); (ls -la ~/subdomains/ 2>/dev/null || echo "no subdomains/ folder")
            echo "=== public_html TOP-LEVEL ===" && ls ~/public_html/ | head -30
            echo "=== public_html/.htaccess ===" && cat ~/public_html/.htaccess 2>/dev/null || echo "MISSING"
            echo "=== public/index.php exists? ===" && ls ~/public_html/public/index.php 2>/dev/null || echo "MISSING"
            echo "=== PERMISSIONS ===" && stat -c '%a %U:%G %n' ~ ~/public_html ~/public_html/public ~/public_html/public/index.php ~/public_html/.htaccess 2>&1
            echo "=== PHP version ===" && php -v | head -1
            echo "test-deploy-marker" > ~/public_html/deploytest.txt
            echo "=== wrote deploytest.txt ===" && ls -la ~/public_html/deploytest.txt
            cd ~/public_html
            php artisan storage:link 2>/dev/null || true
            php artisan config:clear
            php artisan config:cache
            php artisan route:clear
            php artisan route:cache
            php artisan view:clear
            php artisan migrate --force --no-interaction
            echo "✓ Deployment complete"
