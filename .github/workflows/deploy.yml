name: Deploy to Hostinger

on:
  push:
    branches: [main]
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Build vendor/ in CI — vendor is gitignored so we install it here
      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install Composer dependencies (production)
        working-directory: lekhya-app
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      # Remove the broken absolute symlink from the CI checkout;
      # we recreate it correctly on the server with a plain `ln -sf`
      # (artisan storage:link fails — exec() is disabled on this host).
      - name: Remove public/storage symlink before upload
        run: rm -f lekhya-app/public/storage

      # SCP lekhya-app/ → ~/domains/lekhya.prabhassaas.in/public_html/ on Hostinger.
      # This account hosts multiple domains, each under its own
      # ~/domains/<domain>/public_html/ — NOT the account's top-level
      # ~/public_html, which is unused/unrelated to this site.
      # strip_components=1 strips the "lekhya-app" prefix so every file
      # lands directly inside public_html/ (e.g. lekhya-app/public/ → public_html/public/).
      # .env and storage/ contents already on the server are NOT deleted
      # (SCP overwrites but does not delete missing files).
      - name: Upload lekhya-app to domains/lekhya.prabhassaas.in/public_html
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASS }}
          port: 65002
          source: "lekhya-app"
          target: "domains/lekhya.prabhassaas.in/public_html"
          strip_components: 1
          overwrite: true

      - name: Post-deploy cache refresh
        uses: appleboy/ssh-action@v1.2.0
        env:
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_VISION_MODEL: ${{ secrets.GROQ_VISION_MODEL }}
          GROQ_TEXT_MODEL: ${{ secrets.GROQ_TEXT_MODEL }}
          CASHFREE_CLIENT_ID: ${{ secrets.CASHFREE_CLIENT_ID }}
          CASHFREE_CLIENT_SECRET: ${{ secrets.CASHFREE_CLIENT_SECRET }}
        with:
          host: ${{ secrets.HOSTINGER_SSH_HOST }}
          username: ${{ secrets.HOSTINGER_SSH_USER }}
          password: ${{ secrets.HOSTINGER_SSH_PASS }}
          port: 65002
          envs: MAIL_PASSWORD,GROQ_API_KEY,GROQ_VISION_MODEL,GROQ_TEXT_MODEL,CASHFREE_CLIENT_ID,CASHFREE_CLIENT_SECRET
          script: |
            set -e
            cd ~/domains/lekhya.prabhassaas.in/public_html
            ln -sfn ../storage/app/public public/storage 2>/dev/null || true
            # Laravel expects .env next to artisan (public_html/.env), but the
            # only .env on this server lives one level up at the domain root
            # (~/domains/lekhya.prabhassaas.in/.env) — copy it into place if
            # it isn't already here.
            [ -f .env ] || cp ../.env .env
            php artisan config:clear
            # .env had no APP_KEY yet (MissingAppKeyException in production).
            # `artisan key:generate` only replaces an existing APP_KEY= line
            # and errors out if that line is missing entirely (which it was
            # here), so set the value directly instead. Only touches .env if
            # a real key isn't already present, so redeploys never rotate an
            # existing key and invalidate live sessions/cookies.
            if ! grep -q '^APP_KEY=base64:' .env 2>/dev/null; then
              NEWKEY=$(php artisan key:generate --show)
              if grep -q '^APP_KEY=' .env 2>/dev/null; then
                sed -i "s|^APP_KEY=.*|APP_KEY=${NEWKEY}|" .env
              else
                echo "APP_KEY=${NEWKEY}" >> .env
              fi
            fi

            # Ensure Supabase config is present — .env was missing all three
            # vars entirely, which left the Google SSO client pointed at an
            # empty URL (permanently stuck on "Redirecting to Google...").
            # Only fills in a value if the line is missing or blank, so this
            # never clobbers a value set some other way.
            set_env_if_blank() {
              key="$1"; value="$2"
              [ -z "$value" ] && return 0
              current=$(grep "^${key}=" .env 2>/dev/null | cut -d= -f2-)
              if [ -z "$current" ]; then
                if grep -q "^${key}=" .env 2>/dev/null; then
                  sed -i "s|^${key}=.*|${key}=${value}|" .env
                else
                  echo "${key}=${value}" >> .env
                fi
              fi
            }
            set_env_if_blank SUPABASE_URL "https://ezgfvvqwokxvqmheijmd.supabase.co"
            set_env_if_blank SUPABASE_ANON_KEY "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV6Z2Z2dnF3b2t4dnFtaGVpam1kIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODEzMjY1MTIsImV4cCI6MjA5NjkwMjUxMn0.VwmCIsDqIbLzWmmgXqkIiIO5z27fAUitiWhYT7L1pkI"
            set_env_if_blank SUPABASE_SERVICE_KEY "${{ secrets.SUPABASE_SERVICE_KEY }}"

            # ── Email: Hostinger SMTP ─────────────────────────────────────
            # Force-set (these override Laravel's log-mailer defaults). We
            # authenticate as the real mailbox admin@ but send *from* the
            # support@ alias — Hostinger permits sending as any alias of the
            # authenticated mailbox. The password comes from the MAIL_PASSWORD
            # GitHub secret, forwarded via envs: (never string-interpolated).
            set_env_force() {
              key="$1"; value="$2"
              [ -z "$value" ] && return 0
              grep -v "^${key}=" .env > .env.tmp 2>/dev/null || true
              mv .env.tmp .env
              echo "${key}=${value}" >> .env
            }
            set_env_force MAIL_MAILER "smtp"
            set_env_force MAIL_SCHEME "smtps"
            set_env_force MAIL_HOST "smtp.hostinger.com"
            set_env_force MAIL_PORT "465"
            set_env_force MAIL_USERNAME "admin@prabhassaas.in"
            set_env_force MAIL_FROM_ADDRESS "support@prabhassaas.in"
            set_env_force MAIL_FROM_NAME '"Prabhas SaaS"'
            [ -n "$MAIL_PASSWORD" ] && set_env_force MAIL_PASSWORD "\"$MAIL_PASSWORD\""

            # ── AI: central Prabhas SaaS Groq key ─────────────────────────
            # One shared key powers AI (invoice OCR, suggestions) for every
            # tenant on an active subscription/trial. From the GROQ_API_KEY
            # GitHub secret; AI stays on the offline mock until it's set.
            set_env_force AI_DRIVER "groq"
            [ -n "$GROQ_API_KEY" ] && set_env_force GROQ_API_KEY "$GROQ_API_KEY"
            # Optional overrides — let us point at current/stronger Groq models
            # without a code change (extraction accuracy, or model deprecation).
            [ -n "$GROQ_VISION_MODEL" ] && set_env_force GROQ_VISION_MODEL "$GROQ_VISION_MODEL"
            [ -n "$GROQ_TEXT_MODEL" ] && set_env_force GROQ_TEXT_MODEL "$GROQ_TEXT_MODEL"

            # ── GST verification: Cashfree Verification Suite ─────────────
            # GSTIN lookup/auto-fill. Stays on the offline mock until both
            # Cashfree credentials are present as GitHub secrets.
            if [ -n "$CASHFREE_CLIENT_ID" ] && [ -n "$CASHFREE_CLIENT_SECRET" ]; then
              set_env_force GST_VERIFY_DRIVER "cashfree"
              set_env_force CASHFREE_ENV "production"
              set_env_force CASHFREE_CLIENT_ID "$CASHFREE_CLIENT_ID"
              set_env_force CASHFREE_CLIENT_SECRET "$CASHFREE_CLIENT_SECRET"
            fi

            php artisan config:cache
            php artisan route:clear
            php artisan route:cache
            php artisan view:clear
            php artisan migrate --force --no-interaction

            # Demo data (both seeders are idempotent — skip if already present).
            # DemoDataSeeder ensures the demo tenant/invoices exist; PramaanDemoSeeder
            # enables the CA edition + seeds UDIN/audit/compliance/notice data.
            # Strict-scoped to the demo tenant only — never touches real accounts.
            php artisan db:seed --class=DemoDataSeeder --force --no-interaction || true
            php artisan db:seed --class=PramaanDemoSeeder --force --no-interaction || true
            echo "✓ Deployment complete"

